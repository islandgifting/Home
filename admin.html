<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — ShopLocal SI Marketplace</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f6fb;color:#1a1a2e;min-height:100vh}
header{background:#0a1c4b;color:#fff;padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.2rem;font-weight:800}
header span{font-size:.82rem;color:rgba(255,255,255,.6)}
.container{max-width:900px;margin:2rem auto;padding:0 1.5rem}
.login-box{background:#fff;border-radius:14px;padding:2.5rem;max-width:400px;margin:4rem auto;box-shadow:0 4px 20px rgba(0,0,0,.1);text-align:center}
.login-box h2{color:#0a1c4b;margin-bottom:1.5rem;font-size:1.3rem}
.login-box input{width:100%;padding:.8rem 1rem;border:2px solid #dde2ee;border-radius:8px;font-size:1rem;margin-bottom:1rem;outline:none}
.login-box input:focus{border-color:#0a1c4b}
.login-box button{width:100%;background:#0a1c4b;color:#fff;border:none;padding:.9rem;border-radius:8px;font-weight:700;font-size:1rem;cursor:pointer}
.login-box button:hover{background:#182e6a}
.stats-bar{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat-pill{background:#fff;border-radius:10px;padding:.75rem 1.25rem;font-size:.88rem;font-weight:700;border:1px solid #dde2ee}
.stat-pill span{color:#0a1c4b;font-size:1.3rem;display:block}
.filters{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-btn{padding:.45rem 1rem;border:2px solid #dde2ee;border-radius:20px;background:#fff;font-weight:600;font-size:.82rem;cursor:pointer;transition:all .2s}
.filter-btn.active{background:#0a1c4b;color:#fff;border-color:#0a1c4b}
.listing-card{background:#fff;border-radius:12px;border:1px solid #dde2ee;padding:1.5rem;margin-bottom:1rem;display:flex;gap:1.25rem;align-items:flex-start}
.listing-card.pending{border-left:4px solid #d4a843}
.listing-card.approved{border-left:4px solid #2a9d5c;opacity:.8}
.listing-card.rejected{border-left:4px solid #cc2222;opacity:.6}
.listing-info{flex:1}
.listing-title{font-weight:700;font-size:1rem;color:#0a1c4b;margin-bottom:.25rem}
.listing-meta{font-size:.8rem;color:#64748b;margin-bottom:.5rem}
.listing-desc{font-size:.85rem;color:#1a1a2e;line-height:1.5}
.listing-contact{font-size:.82rem;color:#0a1c4b;font-weight:600;margin-top:.4rem}
.listing-actions{display:flex;flex-direction:column;gap:.5rem;min-width:110px}
.btn-approve{background:#2a9d5c;color:#fff;border:none;padding:.6rem 1rem;border-radius:7px;font-weight:700;font-size:.82rem;cursor:pointer;transition:background .2s}
.btn-approve:hover{background:#1e7a46}
.btn-reject{background:#fff;color:#cc2222;border:2px solid #cc2222;padding:.6rem 1rem;border-radius:7px;font-weight:700;font-size:.82rem;cursor:pointer;transition:all .2s}
.btn-reject:hover{background:#cc2222;color:#fff}
.status-badge{display:inline-block;padding:.2rem .6rem;border-radius:4px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-pending{background:#fff8e1;color:#b8860b}
.badge-approved{background:#e8f8ee;color:#1a6b35}
.badge-rejected{background:#fff0f0;color:#cc2222}
.empty{text-align:center;padding:3rem;color:#64748b;font-size:.95rem}
.loading{text-align:center;padding:3rem;color:#64748b}
#loginSection{display:block}
#adminSection{display:none}
.error-msg{color:#cc2222;font-size:.82rem;margin-top:.5rem}
</style>
</head>
<body>

<header>
  <h1>🛍 ShopLocal SI — Admin Panel</h1>
  <span id="adminLabel"></span>
</header>

<!-- LOGIN -->
<div id="loginSection">
  <div class="login-box">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="passwordInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Log In</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminSection">
  <div class="container">
    <div class="stats-bar">
      <div class="stat-pill"><span id="countPending">—</span>Pending</div>
      <div class="stat-pill"><span id="countApproved">—</span>Approved</div>
      <div class="stat-pill"><span id="countRejected">—</span>Rejected</div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('Pending',this)">⏳ Pending</button>
      <button class="filter-btn" onclick="setFilter('Approved',this)">✅ Approved</button>
      <button class="filter-btn" onclick="setFilter('Rejected',this)">❌ Rejected</button>
    </div>

    <div id="listingsContainer"><div class="loading">Loading listings…</div></div>
  </div>
</div>

<script>
let adminPassword = '';
let allListings = [];
let currentFilter = 'all';

async function login() {
  const pwd = document.getElementById('passwordInput').value;
  if (!pwd) return;

  // Test password by trying to fetch all listings with it
  try {
    const res = await fetch('/.netlify/functions/approve-listing', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword: pwd, id: 'test', status: 'test' })
    });
    const data = await res.json();

    if (res.status === 401) {
      document.getElementById('loginError').textContent = 'Wrong password. Try again.';
      return;
    }

    adminPassword = pwd;
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('adminSection').style.display = 'block';
    document.getElementById('adminLabel').textContent = 'Logged in as Admin';
    loadAllListings();

  } catch(e) {
    document.getElementById('loginError').textContent = 'Connection error. Try again.';
  }
}

async function loadAllListings() {
  document.getElementById('listingsContainer').innerHTML = '<div class="loading">Loading…</div>';

  try {
    // Fetch ALL listings (not just approved) for admin
    const url = `https://api.airtable.com/v0/appyNDNuwGFgR44sg/tblBt9FfVcrMK1aOs?sort[0][field]=Submitted&sort[0][direction]=desc`;
    const res = await fetch(url, {
      headers: { 'Authorization': `Bearer pattpepVsrciRn5To.2f3666388d8f882b39c8a734ed05add6f746f3fa0cd9c20ca38155f00eaf9d87` }
    });
    const data = await res.json();

    allListings = data.records.map(r => ({
      id: r.id,
      title: r.fields.Title || '(no title)',
      price: r.fields.Price || '',
      category: r.fields.Category || '',
      contact: r.fields.Contact || '',
      description: r.fields.Description || '',
      submitted: r.fields.Submitted || '',
      status: r.fields.Status || 'Pending'
    }));

    updateStats();
    renderListings();

  } catch(e) {
    document.getElementById('listingsContainer').innerHTML = '<div class="empty">Failed to load listings. Check your connection.</div>';
  }
}

function updateStats() {
  document.getElementById('countPending').textContent = allListings.filter(l => l.status === 'Pending').length;
  document.getElementById('countApproved').textContent = allListings.filter(l => l.status === 'Approved').length;
  document.getElementById('countRejected').textContent = allListings.filter(l => l.status === 'Rejected').length;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderListings();
}

function renderListings() {
  const filtered = currentFilter === 'all' ? allListings : allListings.filter(l => l.status === currentFilter);
  const container = document.getElementById('listingsContainer');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">No listings found.</div>';
    return;
  }

  container.innerHTML = filtered.map(l => `
    <div class="listing-card ${l.status.toLowerCase()}" id="card-${l.id}">
      <div class="listing-info">
        <div class="listing-title">${l.title} <span class="status-badge badge-${l.status.toLowerCase()}">${l.status}</span></div>
        <div class="listing-meta">📦 ${l.category} · 💰 ${l.price} · 📅 ${l.submitted}</div>
        <div class="listing-desc">${l.description}</div>
        <div class="listing-contact">📞 ${l.contact}</div>
      </div>
      <div class="listing-actions">
        ${l.status !== 'Approved' ? `<button class="btn-approve" onclick="updateStatus('${l.id}','Approved')">✅ Approve</button>` : ''}
        ${l.status !== 'Rejected' ? `<button class="btn-reject" onclick="updateStatus('${l.id}','Rejected')">❌ Reject</button>` : ''}
      </div>
    </div>
  `).join('');
}

async function updateStatus(id, status) {
  const card = document.getElementById('card-' + id);
  card.style.opacity = '0.5';

  try {
    const res = await fetch('/.netlify/functions/approve-listing', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, status, adminPassword })
    });

    if (!res.ok) throw new Error('Failed');

    // Update local data
    const listing = allListings.find(l => l.id === id);
    if (listing) listing.status = status;

    updateStats();
    renderListings();

  } catch(e) {
    card.style.opacity = '1';
    alert('Failed to update. Try again.');
  }
}
</script>
</body>
</html>
